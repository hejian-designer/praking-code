<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="停车查询" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>停车查询</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="page-header card">
        <div class="header-copy">
          <div class="eyebrow">PWA 手机版</div>
          <h1>停车查询</h1>
          <p>手机优先的停车查询工具，支持安装、本地缓存与整点刷新。</p>
        </div>
        <div class="header-actions">
          <button id="installBtn" class="install-btn" hidden>安装到桌面</button>
          <button id="refreshBtn" class="secondary-btn">刷新在场车辆</button>
          <button id="clearBtn" class="danger-btn">清空列表</button>
        </div>
      </header>

      <section class="tool-switch card">
        <button id="singleToolBtn" class="tool-tab tool-tab-active">单车查询</button>
        <button id="batchToolBtn" class="tool-tab">批量查询</button>
      </section>

      <section class="panel-grid">
        <article id="singlePanel" class="card panel">
          <h2>单车查询</h2>
          <div class="input-row">
            <input id="singlePlateInput" type="text" inputmode="text" placeholder="请输入车牌号，例如：沪GAJ226" maxlength="12" />
            <button id="singleQueryBtn" class="primary-btn">查询</button>
          </div>
          <p class="hint">会自动转大写，并把新结果插入列表顶部。</p>
        </article>

        <article id="batchPanel" class="card panel">
          <h2>批量查询</h2>
          <textarea id="batchText" rows="4" placeholder="粘贴任意文本，系统会自动提取车牌号"></textarea>
          <div class="detected-row">
            <div>
              <strong>已识别：</strong>
              <span id="detectedSummary">0 个车牌</span>
            </div>
            <div class="header-actions">
              <button id="detectBtn" class="secondary-btn">识别车牌</button>
              <button id="batchQueryBtn" class="primary-btn">批量查询</button>
            </div>
          </div>
          <div id="detectedList" class="tag-list"></div>
        </article>
      </section>

      <section class="card table-panel">
        <section class="stats-grid stats-strip">
          <article class="stat-card">
            <div class="stat-label">在场车辆</div>
            <div class="stat-value" id="activeCount">0</div>
          </article>
          <article class="stat-card">
            <div class="stat-label">已处理</div>
            <div class="stat-value" id="processedCount">0</div>
          </article>
          <article class="stat-card">
            <div class="stat-label">总欠费</div>
            <div class="stat-value" id="totalFee">0</div>
          </article>
        </section>
        <div class="table-header">
          <h2>查询结果</h2>
          <div id="statusText" class="status-text">准备就绪</div>
        </div>
        <div id="emptyState" class="empty-state">还没有查询记录。</div>
        <div id="cardList" class="result-list"></div>
      </section>
    </div>

    <div id="toast" class="toast"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
